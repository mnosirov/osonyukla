<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Yuklovchi — Instagram & YouTube</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --accent: #6c5ce7;
    --accent2: #00d2a8;
    --text: #eaeaf0;
    --muted: #8a8f9c;
    --danger: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #1b1e27, var(--bg) 60%);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
    text-align: center;
  }
  p.subtitle {
    text-align: center;
    color: var(--muted);
    margin: 0 0 24px;
    font-size: 14px;
  }
  .input-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid #2a2e38;
    background: #10121a;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    padding: 14px 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: opacity .15s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status {
    margin-top: 18px;
    font-size: 14px;
    color: var(--muted);
    min-height: 20px;
    text-align: center;
  }
  .status.error { color: var(--danger); }
  .preview {
    margin-top: 20px;
    display: none;
    background: #10121a;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #2a2e38;
  }
  .preview img {
    width: 100%;
    display: block;
    max-height: 260px;
    object-fit: cover;
  }
  .preview .info {
    padding: 14px 16px;
  }
  .preview .info h3 {
    margin: 0 0 4px;
    font-size: 15px;
  }
  .preview .info span {
    font-size: 13px;
    color: var(--muted);
  }
  .download-btn {
    width: 100%;
    margin-top: 12px;
    background: linear-gradient(135deg, var(--accent2), #00b894);
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🎬 Video Yuklovchi</h1>
    <p class="subtitle">Instagram yoki YouTube havolasini joylashtiring va videoni yuklab oling</p>

    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://www.youtube.com/... yoki https://www.instagram.com/..." />
      <button id="checkBtn">Tekshirish</button>
    </div>

    <div class="status" id="status"></div>

    <div class="preview" id="preview">
      <img id="previewImg" src="" alt="Video preview" />
      <div class="info">
        <h3 id="previewTitle"></h3>
        <span id="previewMeta"></span>
      </div>
      <button class="download-btn" id="downloadBtn" style="margin: 0 16px 16px; width: calc(100% - 32px);">⬇ Yuklab olish</button>
    </div>

    <footer>Faqat YouTube va Instagram havolalari qo'llab-quvvatlanadi. Mualliflik huquqiga hurmat bilan foydalaning.</footer>
  </div>

<script>
const urlInput = document.getElementById('urlInput');
const checkBtn = document.getElementById('checkBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusEl = document.getElementById('status');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const previewTitle = document.getElementById('previewTitle');
const previewMeta = document.getElementById('previewMeta');

let currentUrl = '';

function setStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.className = 'status' + (isError ? ' error' : '');
}

function formatDuration(sec) {
  if (!sec) return '';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

checkBtn.addEventListener('click', async () => {
  const url = urlInput.value.trim();
  if (!url) {
    setStatus('Iltimos, havola kiriting.', true);
    return;
  }
  preview.style.display = 'none';
  setStatus('Video ma\'lumoti olinmoqda...');
  checkBtn.disabled = true;

  try {
    const res = await fetch('/api/info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Xatolik yuz berdi');

    currentUrl = url;
    previewImg.src = data.thumbnail || '';
    previewImg.style.display = data.thumbnail ? 'block' : 'none';
    previewTitle.textContent = data.title || 'Video';
    previewMeta.textContent = [data.uploader, formatDuration(data.duration)].filter(Boolean).join(' • ');
    preview.style.display = 'block';
    setStatus('Video topildi. Endi yuklab olishingiz mumkin.');
  } catch (err) {
    setStatus(err.message, true);
  } finally {
    checkBtn.disabled = false;
  }
});

downloadBtn.addEventListener('click', async () => {
  if (!currentUrl) return;
  downloadBtn.disabled = true;
  downloadBtn.innerHTML = '<span class="spinner"></span>Yuklanmoqda...';
  setStatus('Video serverda tayyorlanmoqda, bu bir necha soniya vaqt olishi mumkin...');

  try {
    const res = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: currentUrl }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Yuklab olishda xatolik');
    }
    const blob = await res.blob();
    const disposition = res.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename="?([^"]+)"?/);
    const filename = match ? match[1] : 'video.mp4';

    const a = document.createElement('a');
    const objUrl = URL.createObjectURL(blob);
    a.href = objUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(objUrl);

    setStatus('Video muvaffaqiyatli yuklab olindi ✅');
  } catch (err) {
    setStatus(err.message, true);
  } finally {
    downloadBtn.disabled = false;
    downloadBtn.textContent = '⬇ Yuklab olish';
  }
});

urlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') checkBtn.click();
});
</script>
</body>
</html>
